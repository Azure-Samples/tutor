name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
    inputs:
      release_tier:
        description: "Release tier to deploy"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - dev
          - prod
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps-polite-wave-029b18f0f.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/azure-static-web-apps-polite-wave-029b18f0f.yml"

jobs:
  build_and_deploy_prod:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'stable')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tier == 'prod' && startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'stable')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tier == 'auto' && startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'stable'))
    runs-on: ubuntu-latest
    name: Build and Deploy Prod
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Validate APIM frontend env
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_APIM_BASE_URL }}" ]; then
            echo "NEXT_PUBLIC_APIM_BASE_URL secret is required for frontend deployment."
            exit 1
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          NEXT_PUBLIC_APIM_BASE_URL: ${{ secrets.NEXT_PUBLIC_APIM_BASE_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_WAVE_029B18F0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/frontend" # App source code path
          api_location: "" # Must be empty for Next.js apps that are not statically exported
          output_location: "" # For Next.js hybrid/App Router, let SWA/Oryx handle build output
          ###### End of Repository/Build Configurations ######

  build_and_deploy_dev:
    if: >-
      (github.event_name == 'push' && (!startsWith(github.ref, 'refs/tags/') || !contains(github.ref_name, 'stable'))) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tier == 'dev') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release_tier == 'auto' && (!startsWith(github.ref, 'refs/tags/') || !contains(github.ref_name, 'stable'))) ||
      (github.event_name == 'pull_request' && github.event.action != 'closed' && github.base_ref == 'main')
    runs-on: ubuntu-latest
    name: Build and Deploy Dev
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Validate APIM frontend env
        run: |
          if [ -z "${{ secrets.NEXT_PUBLIC_APIM_BASE_URL }}" ]; then
            echo "NEXT_PUBLIC_APIM_BASE_URL secret is required for frontend deployment."
            exit 1
          fi
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          NEXT_PUBLIC_APIM_BASE_URL: ${{ secrets.NEXT_PUBLIC_APIM_BASE_URL }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_WAVE_029B18F0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/frontend"
          api_location: ""
          output_location: ""

  close_pull_request_dev:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && (github.base_ref == 'dev' || github.base_ref == 'main')
    runs-on: ubuntu-latest
    name: Close Pull Request Dev
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_WAVE_029B18F0F }}
          app_location: "/frontend"
          api_location: ""
          output_location: ""
          action: "close"
