name: Azure Deploy (azd)

on:
  workflow_dispatch:
    inputs:
      release_tier:
        description: "Release tier to deploy"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - dev
          - prod
      azure_env_name_override:
        description: "Optional env name override for dev tier (for example: 178dev)"
        required: false
        default: ""
        type: string
  push:
    branches:
      - main
    paths:
      - "azure.yaml"
      - "infra/terraform/**"
      - "apps/**"
      - "lib/**"
      - ".github/workflows/azd-deploy.yml"

concurrency:
  group: azd-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      release_tier: ${{ steps.resolve.outputs.release_tier }}
      azure_env_name: ${{ steps.resolve.outputs.azure_env_name }}
      strict_security: ${{ steps.resolve.outputs.strict_security }}
      azure_location: ${{ steps.resolve.outputs.azure_location }}
      aca_environment_name: ${{ steps.resolve.outputs.aca_environment_name }}
    steps:
      - name: Resolve release profile
        id: resolve
        env:
          INPUT_RELEASE_TIER: ${{ github.event.inputs.release_tier }}
          INPUT_AZURE_ENV_NAME_OVERRIDE: ${{ github.event.inputs.azure_env_name_override }}
          REPO_AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          is_stable_tag="false"
          if [[ "$GITHUB_REF" == refs/tags/* ]] && [[ "$GITHUB_REF_NAME" == *stable* ]]; then
            is_stable_tag="true"
          fi

          requested_tier="${INPUT_RELEASE_TIER:-auto}"
          if [ "$requested_tier" = "auto" ]; then
            if [ "$is_stable_tag" = "true" ]; then
              release_tier="prod"
            else
              release_tier="dev"
            fi
          else
            release_tier="$requested_tier"
          fi

          azure_env_name_override="${INPUT_AZURE_ENV_NAME_OVERRIDE:-}"
          if [ -z "$azure_env_name_override" ] && [ -n "${REPO_AZURE_ENV_NAME:-}" ] && [ "$release_tier" = "dev" ]; then
            azure_env_name_override="$REPO_AZURE_ENV_NAME"
          fi

          if [ "$release_tier" = "prod" ] && [ "$is_stable_tag" != "true" ]; then
            echo "Prod releases are allowed only from stable tags. Current ref '$GITHUB_REF_NAME' is not stable-tagged."
            exit 1
          fi

          case "$release_tier" in
            prod)
              strict_security="true"
              azure_env_name="prod"
              ;;
            dev)
              strict_security="false"
              azure_env_name="dev"
              ;;
            *)
              echo "Unsupported release tier: $release_tier"
              exit 1
              ;;
          esac

          if [ -n "$azure_env_name_override" ]; then
            if [ "$release_tier" != "dev" ]; then
              echo "azure_env_name_override is only supported for dev release tier"
              exit 1
            fi

            if [[ ! "$azure_env_name_override" =~ ^[a-z0-9]+$ ]]; then
              echo "Invalid azure_env_name_override '$azure_env_name_override'. Use lowercase letters and digits only."
              exit 1
            fi

            if [[ ! "$azure_env_name_override" =~ dev$ ]]; then
              echo "Invalid azure_env_name_override '$azure_env_name_override'. Value must end with 'dev'."
              exit 1
            fi

            if [ ${#azure_env_name_override} -gt 13 ]; then
              echo "Invalid azure_env_name_override '$azure_env_name_override'. Maximum length is 13 characters."
              exit 1
            fi

            if [ "$azure_env_name_override" = "prod" ]; then
              echo "Invalid azure_env_name_override '$azure_env_name_override'."
              exit 1
            fi

            azure_env_name="$azure_env_name_override"
          fi

          azure_location="eastus2"
          aca_environment_name="tutor-${azure_env_name}-acae"

          echo "release_tier=$release_tier" >> "$GITHUB_OUTPUT"
          echo "azure_env_name=$azure_env_name" >> "$GITHUB_OUTPUT"
          echo "strict_security=$strict_security" >> "$GITHUB_OUTPUT"
          echo "azure_location=$azure_location" >> "$GITHUB_OUTPUT"
          echo "aca_environment_name=$aca_environment_name" >> "$GITHUB_OUTPUT"

          echo "Resolved release profile: tier=$release_tier env=$azure_env_name strict=$strict_security location=$azure_location"

  detect-changes:
    runs-on: ubuntu-latest
    needs: resolve-release
    outputs:
      services_json: ${{ steps.detect.outputs.services_json }}
      service_count: ${{ steps.detect.outputs.service_count }}
      provision_required: ${{ steps.detect.outputs.provision_required }}
      changed_frontend_ui: ${{ steps.detect.outputs.changed_frontend_ui }}
      service_infra_json: ${{ steps.detect.outputs.service_infra_json }}
      service_infra_count: ${{ steps.detect.outputs.service_infra_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed backend services
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          all_services=(avatar chat configuration essays evaluation lms-gateway questions upskilling)
          selected_services=()
          selected_service_infra=()
          provision_required=false
          changed_frontend_ui=false

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            selected_services=("${all_services[@]}")
            selected_service_infra=("${all_services[@]}")
            provision_required=true
          else
            before="$BEFORE_SHA"
            if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
              before="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
            fi

            changed_files="$(git diff --name-only "$before" "$CURRENT_SHA")"

            while IFS= read -r file; do
              [ -z "$file" ] && continue

              case "$file" in
                frontend/*)
                  changed_frontend_ui=true
                  ;;
                azure.yaml|infra/terraform/**)
                  provision_required=true
                  selected_services=("${all_services[@]}")
                  selected_service_infra=("${all_services[@]}")
                  ;;
                .github/workflows/azd-deploy.yml)
                  echo "Workflow-only change detected. Skipping full infrastructure reprovision trigger."
                  ;;
                lib/*)
                  selected_services=("${all_services[@]}")
                  selected_service_infra=("${all_services[@]}")
                  ;;
              esac

              for service in "${all_services[@]}"; do
                if [[ "$file" == apps/${service}/* ]]; then
                  selected_services+=("$service")
                  selected_service_infra+=("$service")
                fi
                if [[ "$file" == infra/terraform/stacks/services/${service}/* ]]; then
                  selected_service_infra+=("$service")
                fi
              done
            done <<< "$changed_files"
          fi

          if [ "${#selected_services[@]}" -eq 0 ]; then
            services_json='[]'
          else
            services_json="$(printf '%s\n' "${selected_services[@]}" | sort -u | jq -R . | jq -s 'map({service:.})')"
          fi

          if [ "${#selected_service_infra[@]}" -eq 0 ]; then
            service_infra_json='[]'
          else
            service_infra_json="$(printf '%s\n' "${selected_service_infra[@]}" | sort -u | jq -R . | jq -s 'map({service:.})')"
          fi

          service_count="$(echo "$services_json" | jq 'length')"
          service_infra_count="$(echo "$service_infra_json" | jq 'length')"

          {
            echo "services_json<<GHEOF"
            echo "$services_json"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"
          {
            echo "service_infra_json<<GHEOF"
            echo "$service_infra_json"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"
          echo "service_count=$service_count" >> "$GITHUB_OUTPUT"
          echo "service_infra_count=$service_infra_count" >> "$GITHUB_OUTPUT"
          echo "provision_required=$provision_required" >> "$GITHUB_OUTPUT"
          echo "changed_frontend_ui=$changed_frontend_ui" >> "$GITHUB_OUTPUT"
          echo "Selected services matrix: $services_json"
          echo "Selected service-infra matrix: $service_infra_json"
          echo "Provision required: $provision_required"
          echo "Frontend UI changed: $changed_frontend_ui"

  provision-foundation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - resolve-release
      - detect-changes
    if: needs.detect-changes.outputs.provision_required == 'true'

    env:
      RELEASE_TIER: ${{ needs.resolve-release.outputs.release_tier }}
      STRICT_SECURITY: ${{ needs.resolve-release.outputs.strict_security }}
      AZURE_ENV_NAME: ${{ needs.resolve-release.outputs.azure_env_name }}
      ACA_ENVIRONMENT_NAME: ${{ needs.resolve-release.outputs.aca_environment_name }}
      AZURE_LOCATION: ${{ needs.resolve-release.outputs.azure_location }}
      TF_VAR_environment: ${{ needs.resolve-release.outputs.azure_env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          pnpm --version

      - name: Preflight checks
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
        run: |
          set -euo pipefail

          command -v azd >/dev/null
          command -v terraform >/dev/null
          command -v docker >/dev/null
          docker info >/dev/null

          : "${AZURE_CLIENT_ID:?Missing secret AZURE_CLIENT_ID}"
          : "${AZURE_TENANT_ID:?Missing secret AZURE_TENANT_ID}"
          : "${AZURE_SUBSCRIPTION_ID:?Missing secret AZURE_SUBSCRIPTION_ID}"
          : "${TFSTATE_RESOURCE_GROUP:?Missing secret TERRAFORM_STATE_RESOURCE_GROUP}"
          : "${TFSTATE_STORAGE_ACCOUNT:?Missing secret TERRAFORM_STATE_STORAGE_ACCOUNT}"
          : "${TFSTATE_CONTAINER:?Missing secret TERRAFORM_STATE_CONTAINER}"

          test -f infra/terraform/provider.conf.json || {
            echo "Missing required file infra/terraform/provider.conf.json"
            exit 1
          }
          test -f infra/terraform/main.tfvars.json || {
            echo "Missing required file infra/terraform/main.tfvars.json"
            exit 1
          }

      - name: Azure Login (attempt 1)
        id: azure_login_primary
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Azure Login (retry)
        id: azure_login_retry
        if: steps.azure_login_primary.outcome == 'failure'
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Ensure Azure login succeeded
        run: |
          if [ "${{ steps.azure_login_primary.outcome }}" = "failure" ] && [ "${{ steps.azure_login_retry.outcome }}" = "failure" ]; then
            echo "Azure login failed on both attempt 1 and retry."
            exit 1
          fi

      - name: Validate RBAC permissions for provisioning
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          SP_OID="$(az ad signed-in-user show --query id -o tsv 2>/dev/null || az account show --query user.name -o tsv 2>/dev/null || true)"
          if [ -z "$SP_OID" ]; then
            SP_OID="$(az rest --method GET --url 'https://graph.microsoft.com/v1.0/me' --query id -o tsv 2>/dev/null || true)"
          fi

          echo "Checking RBAC for principal: ${SP_OID:-unknown}"

          REQUIRED_ACTIONS=(
            "Microsoft.Authorization/roleAssignments/write"
            "Microsoft.Resources/subscriptions/resourceGroups/write"
          )

          missing=0
          for action in "${REQUIRED_ACTIONS[@]}"; do
            has_permission="$(az rest \
              --method POST \
              --url "https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/providers/Microsoft.Authorization/permissions?api-version=2022-04-01" \
              2>/dev/null | jq -r --arg act "$action" '.value[]? | select(.actions[]? == $act or .actions[]? == "*") | .actions[0]' 2>/dev/null | head -1 || true)"

            if [ -z "$has_permission" ]; then
              echo "::warning::May be missing permission: $action"
              echo "  This is needed to create role assignments (AcrPull, Cognitive Services User, etc.)"
              echo "  Fix: assign 'Role Based Access Control Administrator' to the OIDC SP at subscription scope."
              missing=$((missing + 1))
            fi
          done

          # Practical check: try a dry-run role assignment probe
          PROBE_RESULT="$(az role assignment list \
            --scope "/subscriptions/${AZURE_SUBSCRIPTION_ID}" \
            --query "[?principalId=='00000000-0000-0000-0000-000000000000'].id" \
            -o tsv 2>&1 || true)"

          if echo "$PROBE_RESULT" | grep -qi "AuthorizationFailed\|does not have authorization"; then
            echo "::error::OIDC SP cannot read role assignments. It likely lacks 'Role Based Access Control Administrator' or 'User Access Administrator'."
            echo "Fix: az role assignment create --assignee <SP_OID> --role 'Role Based Access Control Administrator' --scope /subscriptions/${AZURE_SUBSCRIPTION_ID}"
            exit 1
          fi

          if [ "$missing" -gt 0 ]; then
            echo "::warning::${missing} permission(s) may be missing. Proceeding — Terraform will fail clearly if they are actually absent."
          else
            echo "RBAC permissions look good."
          fi

      - name: Azure Developer CLI Login
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: azd auth login --federated-credential-provider github --client-id "$AZURE_CLIENT_ID" --tenant-id "$AZURE_TENANT_ID"

      - name: Ensure deployment environment exists
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
          TFSTATE_KEY: ${{ secrets.TERRAFORM_STATE_KEY }}
        run: |
          azd env select "$AZURE_ENV_NAME" || azd env new "$AZURE_ENV_NAME" --no-prompt
          azd env set AZURE_SUBSCRIPTION_ID "$AZURE_SUBSCRIPTION_ID"
          azd env set AZURE_LOCATION "$AZURE_LOCATION"
          azd env set RS_RESOURCE_GROUP "$TFSTATE_RESOURCE_GROUP"
          azd env set RS_STORAGE_ACCOUNT "$TFSTATE_STORAGE_ACCOUNT"
          azd env set RS_CONTAINER_NAME "$TFSTATE_CONTAINER"
          if [ "$AZURE_ENV_NAME" != "prod" ]; then
            TFSTATE_KEY="tutor-${AZURE_ENV_NAME}.tfstate"
          elif [ -z "$TFSTATE_KEY" ]; then
            TFSTATE_KEY="tutor-${AZURE_ENV_NAME}.tfstate"
          fi
          azd env set RS_KEY "$TFSTATE_KEY"

      # ACA environment is now always Terraform-managed (no data-source toggle).
      # The moved block in main.tf handles the count[0] -> no-count migration.

      - name: Bootstrap Terraform state backend if missing
        env:
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
        run: |
          set -euo pipefail

          if ! az group show --name "$TFSTATE_RESOURCE_GROUP" --query name -o tsv >/dev/null 2>&1; then
            echo "Terraform state resource group not found. Creating '$TFSTATE_RESOURCE_GROUP' in '$AZURE_LOCATION'."
            az group create --name "$TFSTATE_RESOURCE_GROUP" --location "$AZURE_LOCATION" --only-show-errors >/dev/null
          fi

          if ! az storage account show --resource-group "$TFSTATE_RESOURCE_GROUP" --name "$TFSTATE_STORAGE_ACCOUNT" --query name -o tsv >/dev/null 2>&1; then
            echo "Terraform state storage account not found. Creating '$TFSTATE_STORAGE_ACCOUNT'."
            az storage account create \
              --resource-group "$TFSTATE_RESOURCE_GROUP" \
              --name "$TFSTATE_STORAGE_ACCOUNT" \
              --location "$AZURE_LOCATION" \
              --sku Standard_LRS \
              --min-tls-version TLS1_2 \
              --allow-blob-public-access false \
              --only-show-errors >/dev/null
          fi

          # Skip container creation if the storage account has restrictive network rules.
          # For existing environments the container already exists; RBAC propagation in the
          # next step will allow Terraform to reach it once the network is opened.
          _STORAGE_PUBLIC=$(az storage account show \
            --resource-group "$TFSTATE_RESOURCE_GROUP" \
            --name "$TFSTATE_STORAGE_ACCOUNT" \
            --query publicNetworkAccess -o tsv 2>/dev/null || echo 'Enabled')
          _STORAGE_DEFAULT=$(az storage account show \
            --resource-group "$TFSTATE_RESOURCE_GROUP" \
            --name "$TFSTATE_STORAGE_ACCOUNT" \
            --query networkRuleSet.defaultAction -o tsv 2>/dev/null || echo 'Allow')

          if [ "$_STORAGE_PUBLIC" = "Disabled" ] || [ "$_STORAGE_DEFAULT" = "Deny" ]; then
            echo "Storage network rules restrict data-plane access. Container creation deferred to network-open step."
          else
            az storage container create \
              --name "$TFSTATE_CONTAINER" \
              --account-name "$TFSTATE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --only-show-errors >/dev/null
          fi

      - name: Ensure Terraform state account is reachable from GitHub runners
        env:
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
        run: |
          set -euo pipefail

          current_access="$(az storage account show \
            --resource-group "$TFSTATE_RESOURCE_GROUP" \
            --name "$TFSTATE_STORAGE_ACCOUNT" \
            --query publicNetworkAccess -o tsv)"

          current_default_action="$(az storage account show \
            --resource-group "$TFSTATE_RESOURCE_GROUP" \
            --name "$TFSTATE_STORAGE_ACCOUNT" \
            --query networkRuleSet.defaultAction -o tsv)"

          echo "TFSTATE_ORIGINAL_PUBLIC_ACCESS=$current_access" >> "$GITHUB_ENV"
          echo "TFSTATE_ORIGINAL_DEFAULT_ACTION=$current_default_action" >> "$GITHUB_ENV"
          echo "TFSTATE_TEMP_NETWORK_OPEN=false" >> "$GITHUB_ENV"

          if [ "$current_access" = "Disabled" ] || [ "$current_default_action" = "Deny" ]; then
            if [ "$RELEASE_TIER" = "prod" ] || [ "$STRICT_SECURITY" = "true" ]; then
              echo "Terraform state storage account is private (publicNetworkAccess=${current_access}, defaultAction=${current_default_action})."
              echo "Strict/prod deployment requires an approved private runner/network path to reach state storage."
              exit 1
            fi

            echo "Dev deployment detected with restricted state network. Temporarily enabling runner reachability."
            az storage account update \
              --resource-group "$TFSTATE_RESOURCE_GROUP" \
              --name "$TFSTATE_STORAGE_ACCOUNT" \
              --public-network-access Enabled \
              --default-action Allow \
              --only-show-errors >/dev/null

            echo "TFSTATE_TEMP_NETWORK_OPEN=true" >> "$GITHUB_ENV"
          fi

      - name: Ensure Terraform state RBAC for OIDC principal
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
        run: |
          set -euo pipefail

          echo "TFSTATE_FALLBACK_ACCESS_KEY=false" >> "$GITHUB_ENV"

          STORAGE_SCOPE="$(az storage account show \
            --resource-group "$TFSTATE_RESOURCE_GROUP" \
            --name "$TFSTATE_STORAGE_ACCOUNT" \
            --query id -o tsv)"

          CONTAINER_SCOPE="${STORAGE_SCOPE}/blobServices/default/containers/${TFSTATE_CONTAINER}"

          PRINCIPAL_OBJECT_ID="$(az ad sp show --id "$AZURE_CLIENT_ID" --query id -o tsv 2>/dev/null || true)"

          if [ -z "$PRINCIPAL_OBJECT_ID" ]; then
            ACCESS_TOKEN="$(az account get-access-token \
              --resource https://management.azure.com/ \
              --query accessToken -o tsv)"

            PRINCIPAL_OBJECT_ID="$(ACCESS_TOKEN="$ACCESS_TOKEN" python -c "import base64,json,os; t=os.environ.get('ACCESS_TOKEN',''); p=t.split('.'); payload=(p[1] + '=' * (-len(p[1]) % 4)) if len(p) > 1 else ''; print(json.loads(base64.urlsafe_b64decode(payload.encode('utf-8')).decode('utf-8')).get('oid','') if payload else '')")"
          fi

          if [ -z "$PRINCIPAL_OBJECT_ID" ]; then
            echo "Unable to resolve OIDC principal object id from access token."
            exit 1
          fi

          set +e
          role_assignment_output="$(az role assignment create \
            --assignee-object-id "$PRINCIPAL_OBJECT_ID" \
            --assignee-principal-type ServicePrincipal \
            --role "Storage Blob Data Contributor" \
            --scope "$CONTAINER_SCOPE" \
            --only-show-errors 2>&1)"
          role_assignment_exit=$?
          set -e

          if [ "$role_assignment_exit" -ne 0 ]; then
            if echo "$role_assignment_output" | grep -Eq 'AuthorizationFailed|roleAssignments/write'; then
              echo "Current principal cannot create RBAC assignments at runtime. Continuing with existing permissions check."
            else
              echo "Role assignment create returned a non-fatal error; continuing with existing permissions check."
              echo "$role_assignment_output"
            fi
          fi

          # Role assignment visibility does not guarantee immediate data-plane access.
          # Probe the blob API with AAD auth and wait for RBAC propagation.
          # Ground-zero deployments may need up to 10 minutes for propagation.
          max_attempts=40
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            if az storage container show \
              --account-name "$TFSTATE_STORAGE_ACCOUNT" \
              --name "$TFSTATE_CONTAINER" \
              --auth-mode login \
              --only-show-errors >/dev/null 2>&1 && \
              az storage blob list \
              --account-name "$TFSTATE_STORAGE_ACCOUNT" \
              --container-name "$TFSTATE_CONTAINER" \
              --auth-mode login \
              --num-results 1 \
              --only-show-errors >/dev/null 2>&1; then
              echo "Terraform state data-plane access is ready."
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "OIDC principal still cannot access state container data-plane after RBAC propagation wait."
              echo "Required permanent access: grant 'Storage Blob Data Contributor' to principal $PRINCIPAL_OBJECT_ID on scope $CONTAINER_SCOPE."
              if [ "$RELEASE_TIER" = "prod" ] || [ "$STRICT_SECURITY" = "true" ]; then
                exit 1
              fi

              # Check whether key-based fallback is even possible on this account.
              shared_key_access="$(az storage account show \
                --resource-group "$TFSTATE_RESOURCE_GROUP" \
                --name "$TFSTATE_STORAGE_ACCOUNT" \
                --query allowSharedKeyAccess -o tsv 2>/dev/null || echo "true")"

              if [ "$shared_key_access" = "false" ]; then
                echo "Storage account '$TFSTATE_STORAGE_ACCOUNT' has shared key access disabled."
                echo "Key-based fallback is not possible. Pre-assign 'Storage Blob Data Contributor' to the OIDC principal:"
                echo "  az role assignment create --assignee-object-id $PRINCIPAL_OBJECT_ID --assignee-principal-type ServicePrincipal --role 'Storage Blob Data Contributor' --scope $CONTAINER_SCOPE"
                exit 1
              fi

              echo "Dev deployment fallback enabled: using storage account key for Terraform backend auth."
              echo "TFSTATE_FALLBACK_ACCESS_KEY=true" >> "$GITHUB_ENV"
              break
            fi

            echo "Waiting for storage RBAC propagation (attempt $attempt/$max_attempts)..."
            sleep 15
            attempt=$((attempt + 1))
          done

      - name: Build Terraform backend config
        env:
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
          TFSTATE_KEY: ${{ secrets.TERRAFORM_STATE_KEY }}
        run: |
          set -euo pipefail

          : "${TFSTATE_RESOURCE_GROUP:?Missing secret TERRAFORM_STATE_RESOURCE_GROUP}"
          : "${TFSTATE_STORAGE_ACCOUNT:?Missing secret TERRAFORM_STATE_STORAGE_ACCOUNT}"
          : "${TFSTATE_CONTAINER:?Missing secret TERRAFORM_STATE_CONTAINER}"
          if [ "$AZURE_ENV_NAME" != "prod" ]; then
            TFSTATE_KEY="tutor-${AZURE_ENV_NAME}.tfstate"
          elif [ -z "$TFSTATE_KEY" ]; then
            TFSTATE_KEY="tutor-${AZURE_ENV_NAME}.tfstate"
          fi

          if [ "${TFSTATE_FALLBACK_ACCESS_KEY:-false}" = "true" ]; then
            TFSTATE_ACCESS_KEY="$(az storage account keys list \
              --resource-group "$TFSTATE_RESOURCE_GROUP" \
              --account-name "$TFSTATE_STORAGE_ACCOUNT" \
              --query '[0].value' -o tsv)"

            if [ -z "$TFSTATE_ACCESS_KEY" ]; then
              echo "Failed to retrieve storage account access key for Terraform backend fallback."
              exit 1
            fi

            {
              echo "resource_group_name  = \"$TFSTATE_RESOURCE_GROUP\""
              echo "storage_account_name = \"$TFSTATE_STORAGE_ACCOUNT\""
              echo "container_name       = \"$TFSTATE_CONTAINER\""
              echo "key                  = \"$TFSTATE_KEY\""
              echo "access_key           = \"$TFSTATE_ACCESS_KEY\""
            } > infra/terraform/backend.hcl
          else
            {
              echo "resource_group_name  = \"$TFSTATE_RESOURCE_GROUP\""
              echo "storage_account_name = \"$TFSTATE_STORAGE_ACCOUNT\""
              echo "container_name       = \"$TFSTATE_CONTAINER\""
              echo "key                  = \"$TFSTATE_KEY\""
              echo "use_azuread_auth     = true"
              echo "use_oidc             = true"
            } > infra/terraform/backend.hcl
          fi

      - name: Validate Terraform configuration with remote backend
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          set -euo pipefail
          cd infra/terraform

          if ! terraform init -reconfigure -backend-config=backend.hcl; then
            echo "WARNING: Terraform init with remote backend failed; validation skipped. azd provision will retry."
            exit 0
          fi

          terraform validate

      - name: Reconcile ACA environment in Terraform state
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
        run: |
          set -euo pipefail
          cd infra/terraform

          terraform init -reconfigure -backend-config=backend.hcl

          RG_NAME="tutor-${AZURE_ENV_NAME}"
          ACA_ID="$(az containerapp env show --resource-group "$RG_NAME" --name "$ACA_ENVIRONMENT_NAME" --query id -o tsv 2>/dev/null || true)"

          if [ -z "$ACA_ID" ]; then
            echo "ACA environment '$ACA_ENVIRONMENT_NAME' not found in resource group '$RG_NAME'. State import not required."
            exit 0
          fi

          if terraform state show 'azurerm_container_app_environment.main[0]' >/dev/null 2>&1; then
            echo "Detected legacy state address azurerm_container_app_environment.main[0]. Moving to azurerm_container_app_environment.main..."
            terraform state mv 'azurerm_container_app_environment.main[0]' azurerm_container_app_environment.main
          fi

          if terraform state show azurerm_container_app_environment.main >/dev/null 2>&1; then
            echo "Terraform state already contains azurerm_container_app_environment.main. No import needed."
            exit 0
          fi

          echo "ACA environment exists in Azure but is missing from Terraform state. Importing azurerm_container_app_environment.main..."

          set +e
          import_output="$(terraform import azurerm_container_app_environment.main "$ACA_ID" 2>&1)"
          import_exit=$?
          set -e

          if [ "$import_exit" -ne 0 ]; then
            echo "$import_output"
            echo "Failed to import existing ACA environment '$ACA_ENVIRONMENT_NAME' into Terraform state."
            exit "$import_exit"
          fi

          echo "$import_output"

          if ! terraform state show azurerm_container_app_environment.main >/dev/null 2>&1; then
            echo "ACA import did not materialize at azurerm_container_app_environment.main. Failing fast."
            exit 1
          fi

          echo "Successfully imported ACA environment into Terraform state."

      # APIM service-edge resources are now managed by per-service stacks
      # via moved blocks. No runtime state surgery needed.

      - name: Wait for ACA deletion reconciliation
        env:
          ACA_ENVIRONMENT_NAME: ${{ needs.resolve-release.outputs.aca_environment_name }}
        run: |
          set -euo pipefail

          RG_NAME="tutor-${AZURE_ENV_NAME}"
          ACA_NAME="${ACA_ENVIRONMENT_NAME}"
          max_attempts=40
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            aca_json="$(az containerapp env show --resource-group "$RG_NAME" --name "$ACA_NAME" -o json 2>/dev/null || true)"

            if [ -z "$aca_json" ]; then
              echo "ACA environment '$ACA_NAME' not found. Safe to proceed with provisioning."
              break
            fi

            state="$(echo "$aca_json" | jq -r '.properties.provisioningState // .provisioningState // "unknown"')"

            if [ "$state" = "Succeeded" ]; then
              echo "ACA environment '$ACA_NAME' is healthy (Succeeded)."
              break
            fi

            if echo "$state" | grep -Eq 'Deleting|InProgress|Updating|ScheduledForDelete'; then
              echo "ACA environment '$ACA_NAME' currently in '$state' state. Waiting for reconciliation ($attempt/$max_attempts)..."
              sleep 30
              attempt=$((attempt + 1))
              continue
            fi

            echo "ACA environment '$ACA_NAME' is in unexpected provisioning state '$state'."
            echo "Failing fast to avoid repeated provision conflicts."
            exit 1
          done

          if [ "$attempt" -gt "$max_attempts" ]; then
            echo "ACA environment '$ACA_NAME' did not reconcile within wait window."
            exit 1
          fi

      # Pre-seed first AI model deployment to avoid 409 RequestConflict.
      # The AVM module deploys all models in parallel via for_each, but Azure
      # Cognitive Services rejects concurrent deployment operations on the same
      # account. This step creates the first model (and its transitive
      # dependencies: resource group, AI Foundry account) so the subsequent
      # full provision only needs to create the second model.
      - name: Pre-seed AI model deployment (serialize Cognitive Services ops)
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_location: ${{ needs.resolve-release.outputs.azure_location }}
        run: |
          set -euo pipefail
          cd infra/terraform

          terraform init -reconfigure -backend-config=backend.hcl

          # Skip pre-seed if the first model already exists in state (idempotent).
          if terraform state show 'module.ai_foundry.azapi_resource.ai_model_deployment["gpt-5-nano"]' >/dev/null 2>&1; then
            echo "First model deployment already in state. Skipping pre-seed."
            exit 0
          fi

          echo "Pre-seeding first model deployment to serialize Cognitive Services operations..."
          terraform apply -auto-approve -parallelism=4 \
            -target='module.ai_foundry.azapi_resource.ai_model_deployment["gpt-5-nano"]'

          echo "Pre-seed complete. Full provision will create the remaining model."

      - name: Normalize ACA probe success thresholds
        run: |
          set -euo pipefail

          RG_NAME="tutor-${AZURE_ENV_NAME}"
          SERVICES=(avatar chat configuration essays evaluation lms-gateway questions upskilling)

          normalize_thresholds() {
            jq '
              .containers |= map(
                if ((.probes // null) == null) then
                  .
                else
                  .probes |= map(
                    . + {
                      successThreshold:
                        (((.successThreshold // 1) | tonumber) as $s
                        | if $s < 1 or $s > 10 then 1 else $s end)
                    }
                  )
                end
              )
            '
          }

          for SERVICE in "${SERVICES[@]}"; do
            APP_NAME="tutor-${SERVICE}-${AZURE_ENV_NAME}"
            RID="$(az containerapp show -g "$RG_NAME" -n "$APP_NAME" --query id -o tsv 2>/dev/null || true)"

            if [ -z "$RID" ]; then
              echo "Container app '$APP_NAME' not found. Skipping threshold normalization."
              continue
            fi

            current_template="$(az rest --method get --url "https://management.azure.com${RID}?api-version=2024-03-01" --query properties.template -o json)"
            normalized_template="$(echo "$current_template" | normalize_thresholds)"

            if [ "$(echo "$current_template" | jq -S .)" = "$(echo "$normalized_template" | jq -S .)" ]; then
              echo "Probe thresholds already valid for '$APP_NAME'."
              continue
            fi

            patch_body="$(jq -n --argjson template "$normalized_template" '{properties:{template:$template}}')"
            echo "Patching probe thresholds for '$APP_NAME'..."
            az rest \
              --method patch \
              --url "https://management.azure.com${RID}?api-version=2024-03-01" \
              --body "$patch_body" \
              --output none
          done

          echo "Probe threshold normalization complete."

      - name: Provision infrastructure
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          RS_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          RS_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          RS_CONTAINER_NAME: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
          RS_KEY: ${{ secrets.TERRAFORM_STATE_KEY }}
        run: |
          set -euo pipefail

          : "${RS_RESOURCE_GROUP:?Missing secret TERRAFORM_STATE_RESOURCE_GROUP}"
          : "${RS_STORAGE_ACCOUNT:?Missing secret TERRAFORM_STATE_STORAGE_ACCOUNT}"
          : "${RS_CONTAINER_NAME:?Missing secret TERRAFORM_STATE_CONTAINER}"
          if [ "$AZURE_ENV_NAME" != "prod" ]; then
            RS_KEY="tutor-${AZURE_ENV_NAME}.tfstate"
          elif [ -z "${RS_KEY:-}" ]; then
            RS_KEY="tutor-${AZURE_ENV_NAME}.tfstate"
          fi
          export RS_KEY

          # Ensure azd always targets the live remote state values.
          azd env set RS_RESOURCE_GROUP "$RS_RESOURCE_GROUP"
          azd env set RS_STORAGE_ACCOUNT "$RS_STORAGE_ACCOUNT"
          azd env set RS_CONTAINER_NAME "$RS_CONTAINER_NAME"
          azd env set RS_KEY "$RS_KEY"

          if [ "$RELEASE_TIER" = "dev" ]; then
            export TF_CLI_ARGS_apply="-parallelism=4"
            echo "Applying all infrastructure via azd provision (single root)."
            max_attempt_minutes=30
          else
            export TF_CLI_ARGS_apply="-parallelism=4"
            echo "Applying all infrastructure via azd provision (single root)."
            max_attempt_minutes=30
          fi

          max_attempts=3
          attempt=1
          previous_transient_signature=""

          extract_transient_signature() {
            local log_file="$1"
            grep -E 'RequestConflict|ContainerAppOperationInProgress|Operation expired|LeaseIdMissing' "$log_file" \
              | sed -E 's/[[:space:]]+/ /g' \
              | sed -E 's/[0-9a-fA-F-]{20,}/<id>/g' \
              | sort -u \
              | tr '\n' '|' || true
          }

          while [ "$attempt" -le "$max_attempts" ]; do
            echo "=== Foundation provision attempt $attempt/$max_attempts ==="

            set +e
            provision_log="azd-provision-attempt-${attempt}.log"
            timeout --signal=TERM --kill-after=2m "${max_attempt_minutes}m" azd provision --no-prompt 2>&1 | tee "$provision_log"
            provision_exit=${PIPESTATUS[0]}
            set -e

            if [ "$provision_exit" -eq 0 ]; then
              echo "Provision succeeded on attempt $attempt"
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Provision failed after $max_attempts attempts."
              exit 1
            fi

            if [ "$provision_exit" -eq 124 ]; then
              if grep -Eq 'Still creating\.\.\.|Still modifying\.\.\.' "$provision_log"; then
                sleep_seconds=$((attempt * 60))
                echo "Provision reached ${max_attempt_minutes}m while Terraform was still making resource progress."
                echo "Retrying in ${sleep_seconds}s to continue from partial completion..."
                sleep "$sleep_seconds"
                attempt=$((attempt + 1))
                continue
              fi

              echo "Provision stopped: attempt exceeded ${max_attempt_minutes}m timeout without progress indicators."
              exit 1
            fi

            # Only retry on known transient Azure control-plane conflicts
            if ! grep -Eq 'RequestConflict|ContainerAppOperationInProgress|Operation expired|LeaseIdMissing' "$provision_log"; then
              echo "Provision failed with non-transient error; not retrying."
              exit "$provision_exit"
            fi

            current_transient_signature="$(extract_transient_signature "$provision_log")"
            if [ -n "$previous_transient_signature" ]; then
              echo "Transient signature changed between attempts."
              echo "Previous: ${previous_transient_signature}"
              echo "Current : ${current_transient_signature}"
            fi

            previous_transient_signature="$current_transient_signature"

            sleep_seconds=$((attempt * 60))
            echo "Transient conflict detected. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

      - name: Capture ACA provisioning diagnostics
        if: failure()
        continue-on-error: true
        run: |
          set +e

          RG_NAME="tutor-${AZURE_ENV_NAME}"
          ACA_ENV_NAME="${ACA_ENVIRONMENT_NAME}"
          DIAG_DIR="diagnostics"
          SERVICES=(avatar chat configuration essays evaluation lms-gateway questions upskilling)

          mkdir -p "$DIAG_DIR"/{meta,env,apps,activity,logs,deployments}

          {
            echo "timestamp_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "resource_group=$RG_NAME"
            echo "aca_environment=$ACA_ENV_NAME"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
          } > "$DIAG_DIR/meta/context.txt"

          az version > "$DIAG_DIR/meta/az-version.json" 2>/dev/null || true
          az account show -o json > "$DIAG_DIR/meta/account.json" 2>/dev/null || true

          az containerapp env show -g "$RG_NAME" -n "$ACA_ENV_NAME" \
            --query '{id:id,name:name,location:location,provisioningState:properties.provisioningState,defaultDomain:properties.defaultDomain,staticIp:properties.staticIp,zoneRedundant:properties.zoneRedundant}' \
            -o json > "$DIAG_DIR/env/aca-environment.json" 2>/dev/null || true

          ACA_ENV_ID="$(az containerapp env show -g "$RG_NAME" -n "$ACA_ENV_NAME" --query id -o tsv 2>/dev/null || true)"
          if [ -n "$ACA_ENV_ID" ]; then
            az monitor activity-log list \
              --resource-id "$ACA_ENV_ID" \
              --status Failed \
              --offset 24h \
              --max-events 200 \
              --query '[].{eventTimestamp:eventTimestamp,operationName:operationName.value,status:status.value,subStatus:subStatus.value,correlationId:correlationId,statusMessage:properties.statusMessage}' \
              -o json > "$DIAG_DIR/env/aca-environment.activity-failures.json" 2>/dev/null || true
          fi

          az monitor activity-log list \
            --resource-group "$RG_NAME" \
            --status Failed \
            --offset 24h \
            --max-events 500 \
            --query '[].{eventTimestamp:eventTimestamp,resourceId:resourceId,operationName:operationName.value,status:status.value,subStatus:subStatus.value,correlationId:correlationId,statusMessage:properties.statusMessage}' \
            -o json > "$DIAG_DIR/activity/resource-group.activity-failures.json" 2>/dev/null || true

          az deployment group list -g "$RG_NAME" \
            --query '[?properties.provisioningState==`Failed`].{name:name,timestamp:properties.timestamp,correlationId:properties.correlationId,provisioningState:properties.provisioningState}' \
            -o json > "$DIAG_DIR/deployments/failed-deployments.json" 2>/dev/null || true

          FAILED_DEPLOYMENTS=$(az deployment group list -g "$RG_NAME" --query '[?properties.provisioningState==`Failed`].name' -o tsv 2>/dev/null || true)
          for DEPLOYMENT in $FAILED_DEPLOYMENTS; do
            [ -z "$DEPLOYMENT" ] && continue
            mkdir -p "$DIAG_DIR/deployments/$DEPLOYMENT"
            az deployment operation group list -g "$RG_NAME" -n "$DEPLOYMENT" \
              --query '[].{operationId:operationId,provisioningState:properties.provisioningState,statusCode:properties.statusCode,statusMessage:properties.statusMessage,targetResource:properties.targetResource.resourceName}' \
              -o json > "$DIAG_DIR/deployments/$DEPLOYMENT/operations.json" 2>/dev/null || true
          done

          for SERVICE in "${SERVICES[@]}"; do
            APP_NAME="tutor-${SERVICE}-${AZURE_ENV_NAME}"
            APP_DIR="$DIAG_DIR/apps/$SERVICE"
            mkdir -p "$APP_DIR"

            az containerapp show -g "$RG_NAME" -n "$APP_NAME" \
              --query '{id:id,name:name,environmentId:properties.environmentId,provisioningState:properties.provisioningState,runningStatus:properties.runningStatus,latestRevisionName:properties.latestRevisionName,latestReadyRevisionName:properties.latestReadyRevisionName,ingressFqdn:properties.configuration.ingress.fqdn}' \
              -o json > "$APP_DIR/app.json" 2>/dev/null || true

            APP_ID="$(az containerapp show -g "$RG_NAME" -n "$APP_NAME" --query id -o tsv 2>/dev/null || true)"
            LATEST_REVISION="$(az containerapp show -g "$RG_NAME" -n "$APP_NAME" --query properties.latestRevisionName -o tsv 2>/dev/null || true)"

            if [ -n "$LATEST_REVISION" ]; then
              az containerapp revision show -g "$RG_NAME" -n "$APP_NAME" --revision "$LATEST_REVISION" \
                --query '{name:name,createdTime:properties.createdTime,active:properties.active,healthState:properties.healthState,runningState:properties.runningState,provisioningState:properties.provisioningState,replicas:properties.replicas,trafficWeight:properties.trafficWeight}' \
                -o json > "$APP_DIR/latest-revision.json" 2>/dev/null || true
            fi

            if [ -n "$APP_ID" ]; then
              az monitor activity-log list \
                --resource-id "$APP_ID" \
                --status Failed \
                --offset 24h \
                --max-events 200 \
                --query '[].{eventTimestamp:eventTimestamp,operationName:operationName.value,status:status.value,subStatus:subStatus.value,correlationId:correlationId,statusMessage:properties.statusMessage}' \
                -o json > "$APP_DIR/activity-failures.json" 2>/dev/null || true
            fi

            az containerapp logs show -g "$RG_NAME" -n "$APP_NAME" --type system --tail 200 > "$DIAG_DIR/logs/${SERVICE}.system.log" 2>&1 || true
          done

          FAILED_EVENT_COUNT=$(jq 'length' "$DIAG_DIR/activity/resource-group.activity-failures.json" 2>/dev/null || echo 0)
          {
            echo "### ACA provisioning diagnostics captured"
            echo "- Resource group: $RG_NAME"
            echo "- ACA environment: $ACA_ENV_NAME"
            echo "- Failed activity events (24h): $FAILED_EVENT_COUNT"
            echo "- Artifact path: diagnostics/"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ACA provisioning diagnostics
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: aca-provision-diagnostics-${{ needs.resolve-release.outputs.azure_env_name }}-${{ github.run_id }}
          path: diagnostics/
          retention-days: 14
          if-no-files-found: warn

      - name: Restore Terraform state network baseline
        if: always()
        env:
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
        run: |
          set -euo pipefail

          if [ "${TFSTATE_TEMP_NETWORK_OPEN:-false}" != "true" ]; then
            echo "No temporary state network changes were made."
            exit 0
          fi

          set +e
          az storage account update \
            --resource-group "$TFSTATE_RESOURCE_GROUP" \
            --name "$TFSTATE_STORAGE_ACCOUNT" \
            --default-action "${TFSTATE_ORIGINAL_DEFAULT_ACTION:-Deny}" \
            --only-show-errors >/dev/null
          restore_default_exit=$?

          az storage account update \
            --resource-group "$TFSTATE_RESOURCE_GROUP" \
            --name "$TFSTATE_STORAGE_ACCOUNT" \
            --public-network-access "${TFSTATE_ORIGINAL_PUBLIC_ACCESS:-Disabled}" \
            --only-show-errors >/dev/null
          restore_access_exit=$?
          set -e

          if [ "$restore_default_exit" -ne 0 ] || [ "$restore_access_exit" -ne 0 ]; then
            echo "WARNING: Failed to fully restore Terraform state network baseline."
            exit 1
          fi

          echo "Terraform state network baseline restored."

      - name: Frontend deployment ownership
        run: |
          echo "Frontend SWA is deployed by .github/workflows/azure-static-web-apps-polite-wave-029b18f0f.yml"
          echo "azd-deploy.yml intentionally deploys infrastructure and backend services only."

  provision-service-infra:
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - detect-changes
      - provision-foundation
      - deploy-backend-services
    if: always() && needs.detect-changes.outputs.service_infra_count != '0' && (needs.detect-changes.outputs.provision_required != 'true' || needs.provision-foundation.result == 'success') && needs.deploy-backend-services.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.service_infra_json) }}

    env:
      RELEASE_TIER: ${{ needs.resolve-release.outputs.release_tier }}
      STRICT_SECURITY: ${{ needs.resolve-release.outputs.strict_security }}
      AZURE_ENV_NAME: ${{ needs.resolve-release.outputs.azure_env_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Check for infra changes since last deploy
        id: infra_diff
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          APP_NAME="tutor-${SERVICE}-${AZURE_ENV_NAME}"
          current_aca_image="$(az containerapp show --resource-group "tutor-${AZURE_ENV_NAME}" --name "$APP_NAME" --query 'properties.template.containers[0].image' -o tsv 2>/dev/null || true)"
          deployed_sha="${current_aca_image##*:}"
          infra_changed="true"

          if [ -n "$deployed_sha" ] && [ "$deployed_sha" != "$GITHUB_SHA" ] && git cat-file -e "${deployed_sha}^{commit}" 2>/dev/null; then
            changes="$(git diff --name-only "$deployed_sha" "$GITHUB_SHA" -- "infra/terraform/stacks/services/${SERVICE}/" "infra/terraform/modules/service-edge-apim/" 2>/dev/null || true)"
            if [ -z "$changes" ]; then
              infra_changed="false"
              echo "No infra changes for service-edge '${SERVICE}' between ${deployed_sha:0:8} and ${GITHUB_SHA:0:8}."
            else
              echo "Infra changes detected for '${SERVICE}':"
              echo "$changes"
            fi
          elif [ "$deployed_sha" = "$GITHUB_SHA" ]; then
            infra_changed="false"
            echo "Deployed SHA matches current SHA. No infra changes."
          else
            echo "Cannot resolve deployed SHA (first deploy or pruned history). Will run terraform apply."
          fi

          echo "infra_changed=$infra_changed" >> "$GITHUB_OUTPUT"

      - name: Apply changed service-edge stack
        if: steps.infra_diff.outputs.infra_changed != 'false'
        env:
          SERVICE: ${{ matrix.service }}
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
          TF_VAR_environment: ${{ needs.resolve-release.outputs.azure_env_name }}
          TF_VAR_name_prefix: tutor
        run: |
          set -euo pipefail

          STACK_DIR="infra/terraform/stacks/services/${SERVICE}"
          if [ ! -d "$STACK_DIR" ]; then
            echo "Missing stack directory: $STACK_DIR"
            exit 1
          fi

          SWA_NAME="tutor-${AZURE_ENV_NAME}-frontend"
          SWA_DEFAULT_HOST="$(az staticwebapp show --name "$SWA_NAME" --resource-group "tutor-${AZURE_ENV_NAME}" --query 'defaultHostname' -o tsv 2>/dev/null || true)"
          if [ -z "$SWA_DEFAULT_HOST" ]; then
            echo "Unable to resolve default SWA hostname for '$SWA_NAME'."
            exit 1
          fi

          mapfile -t SWA_CUSTOM_HOSTS < <(
            az staticwebapp hostname list \
              --name "$SWA_NAME" \
              --resource-group "tutor-${AZURE_ENV_NAME}" \
              --query "[?name!='${SWA_DEFAULT_HOST}'].name" \
              -o tsv 2>/dev/null || true
          )

          REQUIRED_ORIGINS=("https://${SWA_DEFAULT_HOST}")
          for custom_host in "${SWA_CUSTOM_HOSTS[@]}"; do
            [ -n "$custom_host" ] || continue
            REQUIRED_ORIGINS+=("https://${custom_host}")
          done

          TF_VAR_allowed_origins="$(printf '%s\n' "${REQUIRED_ORIGINS[@]}" | awk 'NF' | python -c 'import json,sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')"
          export TF_VAR_allowed_origins
          echo "Resolved APIM required origins for ${SERVICE}: ${TF_VAR_allowed_origins}"

          terraform -chdir="$STACK_DIR" init -backend=false -input=false

          # Helper: only import if not already in state
          safe_import() {
            local addr="$1" id="$2"
            if terraform -chdir="$STACK_DIR" state show "$addr" >/dev/null 2>&1; then
              echo "Already in state: $addr — skipping import."
            else
              echo "Importing $addr ..."
              terraform -chdir="$STACK_DIR" import "$addr" "$id" || echo "Import failed for $addr (resource may not exist in Azure yet)."
            fi
          }

          API_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/tutor-${AZURE_ENV_NAME}/providers/Microsoft.ApiManagement/service/tutor-${AZURE_ENV_NAME}-apim/apis/${SERVICE}-api;rev=1"
          POLICY_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/tutor-${AZURE_ENV_NAME}/providers/Microsoft.ApiManagement/service/tutor-${AZURE_ENV_NAME}-apim/apis/${SERVICE}-api"

          safe_import "module.service_edge.azurerm_api_management_api.service" "$API_ID"
          safe_import "module.service_edge.azurerm_api_management_api_policy.service" "$POLICY_ID"

          methods=(get post put patch delete options head)
          for method in "${methods[@]}"; do
            operation_id="${SERVICE}-${method}"
            operation_id="${operation_id//-/}"
            operation_resource_id="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/tutor-${AZURE_ENV_NAME}/providers/Microsoft.ApiManagement/service/tutor-${AZURE_ENV_NAME}-apim/apis/${SERVICE}-api/operations/${operation_id}"
            safe_import "module.service_edge.azurerm_api_management_api_operation.catch_all[\"${method}\"]" "$operation_resource_id"
          done

          terraform -chdir="$STACK_DIR" apply -auto-approve

  deploy-backend-services:
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - detect-changes
      - provision-foundation
    if: always() && needs.detect-changes.outputs.service_count != '0' && (needs.detect-changes.outputs.provision_required != 'true' || needs.provision-foundation.result == 'success')
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    env:
      RELEASE_TIER: ${{ needs.resolve-release.outputs.release_tier }}
      STRICT_SECURITY: ${{ needs.resolve-release.outputs.strict_security }}
      AZURE_ENV_NAME: ${{ needs.resolve-release.outputs.azure_env_name }}
      ACA_ENVIRONMENT_NAME: ${{ needs.resolve-release.outputs.aca_environment_name }}
      AZURE_LOCATION: ${{ needs.resolve-release.outputs.azure_location }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Azure Developer CLI
        uses: Azure/setup-azd@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Azure Developer CLI Login
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: azd auth login --federated-credential-provider github --client-id "$AZURE_CLIENT_ID" --tenant-id "$AZURE_TENANT_ID"

      - name: Ensure deployment environment exists
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
          TFSTATE_KEY: ${{ secrets.TERRAFORM_STATE_KEY }}
        run: |
          azd env select "$AZURE_ENV_NAME" || azd env new "$AZURE_ENV_NAME" --no-prompt
          azd env set AZURE_SUBSCRIPTION_ID "$AZURE_SUBSCRIPTION_ID"
          azd env set AZURE_LOCATION "$AZURE_LOCATION"
          azd env set RS_RESOURCE_GROUP "$TFSTATE_RESOURCE_GROUP"
          azd env set RS_STORAGE_ACCOUNT "$TFSTATE_STORAGE_ACCOUNT"
          azd env set RS_CONTAINER_NAME "$TFSTATE_CONTAINER"
          if [ "$AZURE_ENV_NAME" != "prod" ]; then
            TFSTATE_KEY="tutor-${AZURE_ENV_NAME}.tfstate"
          elif [ -z "$TFSTATE_KEY" ]; then
            TFSTATE_KEY="tutor-${AZURE_ENV_NAME}.tfstate"
          fi
          azd env set RS_KEY "$TFSTATE_KEY"

      - name: Build and deploy service image
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          APP_NAME="tutor-${SERVICE}-${AZURE_ENV_NAME}"

          wait_for_container_app_ready() {
            local max_attempts=40
            local attempt=1
            local state=""

            while [ "$attempt" -le "$max_attempts" ]; do
              state="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.provisioningState' -o tsv 2>/dev/null || true)"

              if [ -z "$state" ] || [ "$state" = "Succeeded" ] || [ "$state" = "Failed" ]; then
                echo "Container app '$APP_NAME' provisioning state: ${state:-unknown}."
                return 0
              fi

              echo "Container app '$APP_NAME' is busy (state: $state). Waiting for completion (attempt $attempt/$max_attempts)..."
              sleep 15
              attempt=$((attempt + 1))
            done

            echo "Timed out waiting for container app '$APP_NAME' to finish active provisioning operations."
            return 1
          }

          wait_for_target_image_rollout() {
            local max_attempts=60
            local attempt=1
            local state=""
            local current_image=""

            while [ "$attempt" -le "$max_attempts" ]; do
              state="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.provisioningState' -o tsv 2>/dev/null || true)"
              current_image="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.template.containers[0].image' -o tsv 2>/dev/null || true)"

              if [ "$current_image" = "$IMAGE" ] && { [ -z "$state" ] || [ "$state" = "Succeeded" ]; }; then
                echo "Container app '$APP_NAME' is now serving image '$IMAGE'."
                return 0
              fi

              if [ "$state" = "Failed" ]; then
                echo "Container app '$APP_NAME' reached transient Failed state while waiting for image rollout; retrying."
              fi

              echo "Waiting for '$APP_NAME' rollout (state: ${state:-unknown}, image: ${current_image:-unknown}) attempt $attempt/$max_attempts..."
              sleep 15
              attempt=$((attempt + 1))
            done

            echo "Timed out waiting for '$APP_NAME' to roll out image '$IMAGE'."
            return 1
          }

          dump_revision_diagnostics() {
            local latest_revision=""

            latest_revision="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.latestRevisionName' -o tsv 2>/dev/null || true)"

            echo "Revision summary for '$APP_NAME':"
            az containerapp revision list \
              --resource-group "$RG" \
              --name "$APP_NAME" \
              --query '[].{name:name,active:properties.active,runningState:properties.runningState,replicas:properties.replicas,createdTime:properties.createdTime,image:properties.template.containers[0].image}' \
              -o table || true

            if [ -n "$latest_revision" ]; then
              echo "System logs for latest revision '$latest_revision':"
              az containerapp logs show \
                --resource-group "$RG" \
                --name "$APP_NAME" \
                --type system \
                --revision "$latest_revision" \
                --tail 120 || true
            fi
          }

          wait_for_latest_revision_ready() {
            local max_attempts=40
            local attempt=1
            local latest_revision=""
            local latest_ready_revision=""
            local running_state=""
            local replicas=""

            while [ "$attempt" -le "$max_attempts" ]; do
              latest_revision="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.latestRevisionName' -o tsv 2>/dev/null || true)"
              latest_ready_revision="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.latestReadyRevisionName' -o tsv 2>/dev/null || true)"

              if [ -n "$latest_revision" ]; then
                running_state="$(az containerapp revision show --resource-group "$RG" --name "$APP_NAME" --revision "$latest_revision" --query 'properties.runningState' -o tsv 2>/dev/null || true)"
                replicas="$(az containerapp revision show --resource-group "$RG" --name "$APP_NAME" --revision "$latest_revision" --query 'properties.replicas' -o tsv 2>/dev/null || true)"
              else
                running_state=""
                replicas=""
              fi

              if [ -n "$latest_revision" ] \
                && [ "$latest_revision" = "$latest_ready_revision" ] \
                && { [ "$running_state" = "Running" ] || [ "$running_state" = "ScaledToZero" ]; }; then
                echo "Latest revision '$latest_revision' is ready and running for '$APP_NAME'."
                return 0
              fi

              if [ "$running_state" = "ActivationFailed" ]; then
                echo "Latest revision '$latest_revision' entered ActivationFailed for '$APP_NAME'."
                dump_revision_diagnostics
                return 1
              fi

              echo "Waiting for latest revision readiness on '$APP_NAME' (latest: ${latest_revision:-none}, ready: ${latest_ready_revision:-none}, runningState: ${running_state:-unknown}, replicas: ${replicas:-0}) attempt $attempt/$max_attempts..."
              sleep 15
              attempt=$((attempt + 1))
            done

            echo "Timed out waiting for latest revision readiness on '$APP_NAME'."
            dump_revision_diagnostics
            return 1
          }

          rollback_to_latest_ready_revision() {
            local latest_revision=""
            local latest_ready_revision=""
            local revision_mode=""

            latest_revision="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.latestRevisionName' -o tsv 2>/dev/null || true)"
            latest_ready_revision="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.latestReadyRevisionName' -o tsv 2>/dev/null || true)"
            revision_mode="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.configuration.activeRevisionsMode' -o tsv 2>/dev/null || true)"

            if [ -n "$latest_ready_revision" ] && [ "$latest_ready_revision" != "$latest_revision" ]; then
              if [ "$revision_mode" = "Single" ]; then
                echo "Single revision mode: deactivating failed revision '$latest_revision' so '$latest_ready_revision' can serve traffic."
                az containerapp revision deactivate \
                  --resource-group "$RG" \
                  --name "$APP_NAME" \
                  --revision "$latest_revision" \
                  --output none || true
              else
                echo "Attempting rollback traffic to latest ready revision '$latest_ready_revision' for '$APP_NAME'."
                az containerapp ingress traffic set \
                  --resource-group "$RG" \
                  --name "$APP_NAME" \
                  --revision-weight "${latest_ready_revision}=100" \
                  --output none || true
              fi
            fi
          }

          RG="$(az resource list --resource-type Microsoft.App/containerApps --name "$APP_NAME" --query 'sort_by(@, &id)[0].resourceGroup' -o tsv 2>/dev/null || true)"
          if [ -z "$RG" ]; then
            echo "Unable to discover resource group for container app '$APP_NAME'"
            exit 1
          fi

          ACR_SERVER="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.configuration.registries[0].server' -o tsv 2>/dev/null || true)"
          if [ -z "$ACR_SERVER" ]; then
            CURRENT_IMAGE="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.template.containers[0].image' -o tsv 2>/dev/null || true)"
            if [ -n "$CURRENT_IMAGE" ]; then
              CANDIDATE_SERVER="${CURRENT_IMAGE%%/*}"
              if [[ "$CANDIDATE_SERVER" == *.azurecr.io ]]; then
                ACR_SERVER="$CANDIDATE_SERVER"
              fi
            fi
          fi

          if [ -z "$ACR_SERVER" ]; then
            ACR_SERVER="$(az acr list --resource-group "$RG" --query 'sort_by(@, &name)[0].loginServer' -o tsv 2>/dev/null || true)"
          fi

          ACR_NAME=""
          if [ -n "$ACR_SERVER" ] && [[ "$ACR_SERVER" == *.azurecr.io ]]; then
            ACR_NAME="${ACR_SERVER%%.azurecr.io}"
          fi

          if [ -z "$ACR_NAME" ] || [ -z "$ACR_SERVER" ] || [[ "$ACR_SERVER" != *.azurecr.io ]]; then
            echo "Missing valid ACR name/server for app '$APP_NAME' in resource group '$RG'"
            exit 1
          fi

          IMAGE="${ACR_SERVER}/tutor/${SERVICE}-${AZURE_ENV_NAME}:${GITHUB_SHA}"
          DOCKERFILE="apps/${SERVICE}/dockerfile"
          REPO_NAME="tutor/${SERVICE}-${AZURE_ENV_NAME}"

          # --- Skip-if-unchanged: compare deployed SHA vs current SHA ---
          current_aca_image="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.template.containers[0].image' -o tsv 2>/dev/null || true)"
          deployed_sha="${current_aca_image##*:}"
          source_changed="true"

          if [ -n "$deployed_sha" ] && [ "$deployed_sha" != "$GITHUB_SHA" ] && git cat-file -e "${deployed_sha}^{commit}" 2>/dev/null; then
            changes="$(git diff --name-only "$deployed_sha" "$GITHUB_SHA" -- "apps/${SERVICE}/" "lib/" 2>/dev/null || true)"
            if [ -z "$changes" ]; then
              source_changed="false"
              echo "No source changes in apps/${SERVICE}/ or lib/ between deployed SHA ${deployed_sha:0:8} and current SHA ${GITHUB_SHA:0:8}."
            else
              echo "Source changes detected since deployed SHA ${deployed_sha:0:8}:"
              echo "$changes"
            fi
          elif [ "$deployed_sha" = "$GITHUB_SHA" ]; then
            source_changed="false"
            echo "ACA is already running image tagged with current SHA ${GITHUB_SHA:0:8}."
          fi

          if [ "$source_changed" = "false" ]; then
            aca_state="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.provisioningState' -o tsv 2>/dev/null || true)"
            latest_revision="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.latestRevisionName' -o tsv 2>/dev/null || true)"
            latest_ready="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.latestReadyRevisionName' -o tsv 2>/dev/null || true)"
            running_state="$(az containerapp revision show --resource-group "$RG" --name "$APP_NAME" --revision "$latest_revision" --query 'properties.runningState' -o tsv 2>/dev/null || true)"

            if [ "$aca_state" = "Succeeded" ] && [ "$latest_revision" = "$latest_ready" ] && { [ "$running_state" = "Running" ] || [ "$running_state" = "ScaledToZero" ]; }; then
              echo "::notice::No source changes for '${SERVICE}' and ACA revision is healthy. Skipping build/push/deploy."
            else
              echo "::warning::No source changes for '${SERVICE}', but ACA is not fully healthy (state=$aca_state, running=$running_state). Skipping deploy to keep provision/update stable."
              echo "::warning::Use a service-specific deploy run when you need to force recovery for this app."
            fi

            echo "DEPLOY_SKIPPED=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "DEPLOY_SKIPPED=false" >> "$GITHUB_ENV"

          eval "$(azd env get-values | sed -E 's/^([^=]+)=(.*)$/export \1=\2/')"

          ENV_VARS=(
            "COSMOS_ENDPOINT=${COSMOS_ENDPOINT:-}"
            "COSMOS_DATABASE=${COSMOS_DATABASE:-}"
            "COSMOS_AVATAR_CASE_TABLE=${COSMOS_AVATAR_CASE_TABLE:-}"
            "COSMOS_CONFIGURATION_TABLE=${COSMOS_CONFIGURATION_TABLE:-}"
            "COSMOS_STUDENT_TABLE=${COSMOS_STUDENT_TABLE:-}"
            "COSMOS_PROFESSOR_TABLE=${COSMOS_PROFESSOR_TABLE:-}"
            "COSMOS_COURSE_TABLE=${COSMOS_COURSE_TABLE:-}"
            "COSMOS_CLASS_TABLE=${COSMOS_CLASS_TABLE:-}"
            "COSMOS_GROUP_TABLE=${COSMOS_GROUP_TABLE:-}"
            "COSMOS_ESSAY_TABLE=${COSMOS_ESSAY_TABLE:-}"
            "COSMOS_RESOURCE_TABLE=${COSMOS_RESOURCE_TABLE:-}"
            "COSMOS_ASSEMBLY_TABLE=${COSMOS_ASSEMBLY_TABLE:-}"
            "COSMOS_QUESTION_TABLE=${COSMOS_QUESTION_TABLE:-}"
            "COSMOS_ANSWER_TABLE=${COSMOS_ANSWER_TABLE:-}"
            "COSMOS_GRADER_TABLE=${COSMOS_GRADER_TABLE:-}"
            "COSMOS_UPSKILLING_TABLE=${COSMOS_UPSKILLING_TABLE:-}"
            "PROJECT_ENDPOINT=${PROJECT_ENDPOINT:-}"
            "MODEL_DEPLOYMENT_NAME=${MODEL_DEPLOYMENT_NAME:-}"
            "MODEL_REASONING_DEPLOYMENT=${MODEL_REASONING_DEPLOYMENT:-}"
            "BLOB_CONNECTION_STRING=${BLOB_CONNECTION_STRING:-}"
            "BLOB_CONTAINER_NAME=${BLOB_CONTAINER_NAME:-}"
            "SPEECH_RESOURCE_ID=${SPEECH_RESOURCE_ID:-}"
            "SPEECH_REGION=${SPEECH_REGION:-}"
            "ENTRA_AUTH_ENABLED=${ENTRA_AUTH_ENABLED:-false}"
            "ENTRA_TENANT_ID=${ENTRA_TENANT_ID:-}"
            "ENTRA_API_CLIENT_ID=${ENTRA_API_CLIENT_ID:-}"
            "ENTRA_TOKEN_AUDIENCE=${ENTRA_TOKEN_AUDIENCE:-}"
            "ENTRA_ALLOWED_CLIENT_APP_IDS=${ENTRA_ALLOWED_CLIENT_APP_IDS:-}"
            "ENTRA_TEACHER_CLIENT_ID=${ENTRA_TEACHER_CLIENT_ID:-}"
            "ENTRA_TEACHER_CLIENT_SECRET=${ENTRA_TEACHER_CLIENT_SECRET:-}"
            "STUDENT_SECRET_SALT=${STUDENT_SECRET_SALT:-}"
          )

          if [ ! -f "$DOCKERFILE" ]; then
            echo "Dockerfile not found for service '$SERVICE' at $DOCKERFILE"
            exit 1
          fi

          az acr login --name "$ACR_NAME"
          docker build -f "$DOCKERFILE" -t "$IMAGE" .
          docker push "$IMAGE"

          # Ensure ACR registry is configured with managed identity auth.
          # On ground-zero deploys, Terraform creates ACA apps without a registry
          # block to avoid chicken-and-egg with AcrPull role assignment.
          az containerapp registry set \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --server "$ACR_SERVER" \
            --identity system

          wait_for_container_app_ready

          # --- Pre-deploy cleanup: deactivate any old ActivationFailed revisions ---
          # In Single revision mode, a zombie revision (Active=True + ActivationFailed)
          # blocks activation of subsequent revisions. Deactivating it clears the
          # control-plane deadlock so the new revision can schedule replicas.
          LATEST_REVISION="$(az containerapp show -g "$RG" -n "$APP_NAME" --query 'properties.latestRevisionName' -o tsv 2>/dev/null || true)"
          OLD_FAILED_REVISIONS="$(az containerapp revision list \
            -g "$RG" -n "$APP_NAME" \
            --query "[?properties.active==\`true\` && (properties.runningState=='ActivationFailed' || properties.runningState=='Activating')].name" \
            -o tsv 2>/dev/null || true)"

          if [ -n "$OLD_FAILED_REVISIONS" ]; then
            echo "Deactivating old failed/activating revisions for '$APP_NAME' before deploy:"
            for old_rev in $OLD_FAILED_REVISIONS; do
              echo "  Deactivating: $old_rev"
              az containerapp revision deactivate \
                -g "$RG" -n "$APP_NAME" \
                --revision "$old_rev" || true
            done
            # Wait for deactivation to settle
            sleep 10
            wait_for_container_app_ready
          fi

          # --- Atomic deploy: image + env vars + probes + clear command ---
          # Uses ARM REST PATCH to set the container spec in a single operation.
          # The containers array is replaced entirely (ARM array semantics),
          # so omitting command/args clears Terraform's placeholder http.server.
          # This is the only reliable way to clear command overrides — the CLI
          # flags and --yaml merge don't support removing existing values.

          # Build env vars as JSON array for jq
          ENV_JSON="[]"
          for ev in "${ENV_VARS[@]}"; do
            ev_name="${ev%%=*}"
            ev_value="${ev#*=}"
            ENV_JSON=$(echo "$ENV_JSON" | jq --arg n "$ev_name" --arg v "$ev_value" '. + [{"name": $n, "value": $v}]')
          done

          # Build the PATCH body: image, env, probes — no command/args
          RID="$(az containerapp show -g "$RG" -n "$APP_NAME" --query id -o tsv)"
          PATCH_BODY=$(jq -n \
            --arg img "$IMAGE" \
            --arg name "$SERVICE" \
            --argjson env "$ENV_JSON" \
            '{
              properties: {
                template: {
                  scale: { minReplicas: 1 },
                  containers: [{
                    name: $name,
                    image: $img,
                    env: $env,
                    resources: { cpu: 0.5, memory: "1Gi" },
                    probes: [
                      {
                        type: "Readiness",
                        httpGet: { path: "/health", port: 8000 },
                        successThreshold: 1,
                        failureThreshold: 3,
                        periodSeconds: 10,
                        timeoutSeconds: 5
                      },
                      {
                        type: "Startup",
                        httpGet: { path: "/health", port: 8000 },
                        successThreshold: 1,
                        failureThreshold: 30,
                        periodSeconds: 10,
                        timeoutSeconds: 5
                      }
                    ]
                  }]
                }
              }
            }')

          echo "Deploying ${SERVICE} with image, env vars, and health probes (ARM REST PATCH)."

          max_update_attempts=6
          update_attempt=1
          while [ "$update_attempt" -le "$max_update_attempts" ]; do
            set +e
            update_output="$(az rest \
              --method patch \
              --url "https://management.azure.com${RID}?api-version=2024-03-01" \
              --body "$PATCH_BODY" \
              --output none 2>&1)"
            update_exit=$?
            set -e

            if [ "$update_exit" -eq 0 ]; then
              if wait_for_target_image_rollout; then
                if wait_for_latest_revision_ready; then
                  echo "Container app '$APP_NAME' updated successfully on attempt $update_attempt/$max_update_attempts."
                  break
                fi

                echo "Container app '$APP_NAME' image updated but latest revision is not ready on attempt $update_attempt/$max_update_attempts."
                rollback_to_latest_ready_revision
                wait_for_container_app_ready
                sleep $((update_attempt * 10))
                update_attempt=$((update_attempt + 1))
                continue
              fi

              echo "Container app '$APP_NAME' update accepted but rollout not confirmed on attempt $update_attempt/$max_update_attempts."
              wait_for_container_app_ready
              sleep $((update_attempt * 10))
              update_attempt=$((update_attempt + 1))
              continue
            fi

            if echo "$update_output" | grep -Eq 'ContainerAppOperationInProgress|Operation expired'; then
              echo "Transient container app update conflict for '$APP_NAME' on attempt $update_attempt/$max_update_attempts."
              echo "$update_output"
              wait_for_container_app_ready
              sleep $((update_attempt * 10))
              update_attempt=$((update_attempt + 1))
              continue
            fi

            echo "$update_output"
            exit "$update_exit"
          done

          if [ "$update_attempt" -gt "$max_update_attempts" ]; then
            echo "Container app '$APP_NAME' update did not succeed after $max_update_attempts attempts."
            exit 1
          fi

      - name: Validate backend health
        continue-on-error: true
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail

          APP_NAME="tutor-${SERVICE}-${AZURE_ENV_NAME}"
          RG="$(az resource list --resource-type Microsoft.App/containerApps --name "$APP_NAME" --query 'sort_by(@, &id)[0].resourceGroup' -o tsv 2>/dev/null || true)"

          # Check if the container is running actual service code (not the Terraform placeholder)
          current_image="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.template.containers[0].image' -o tsv 2>/dev/null || true)"
          if echo "$current_image" | grep -qE 'mcr\.microsoft\.com|http\.server'; then
            echo "::warning::Container '$APP_NAME' is still running placeholder image ($current_image). Skipping health check."
            exit 0
          fi

          # Check if the revision scaled to zero — cold start may serve stale revision
          running_state="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.runningStatus' -o tsv 2>/dev/null || true)"
          replicas="$(az containerapp revision show --resource-group "$RG" --name "$APP_NAME" \
            --revision "$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.latestRevisionName' -o tsv 2>/dev/null)" \
            --query 'properties.replicas' -o tsv 2>/dev/null || echo 0)"

          FQDN="$(az containerapp show --resource-group "$RG" --name "$APP_NAME" --query 'properties.configuration.ingress.fqdn' -o tsv 2>/dev/null || true)"

          if [ -z "$FQDN" ]; then
            echo "::warning::Could not resolve FQDN for '$APP_NAME'. Skipping direct health check."
            exit 0
          fi

          HEALTH_URL="https://${FQDN}/health"
          echo "=== Backend health check :: ${APP_NAME} → ${HEALTH_URL} (replicas=${replicas:-0}) ==="

          max_attempts=6
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            status_code="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 15 "$HEALTH_URL" 2>/dev/null || echo 000)"

            if [ "$status_code" = "200" ]; then
              echo "Health check passed for '$APP_NAME' (HTTP $status_code)."
              exit 0
            fi

            echo "Health check attempt $attempt/$max_attempts: HTTP $status_code (expected 200). Retrying in 15s..."
            sleep 15
            attempt=$((attempt + 1))
          done

          echo "::warning::Backend health check did not get HTTP 200 for '$APP_NAME' (last: $status_code). Guardrail APIM smoke check will be the final gate."

  post-deploy-guardrails:
    runs-on: ubuntu-latest
    needs:
      - resolve-release
      - detect-changes
      - deploy-backend-services
      - provision-service-infra
    if: always() && needs.detect-changes.outputs.service_count != '0' && needs.deploy-backend-services.result == 'success' && (needs.provision-service-infra.result == 'success' || needs.provision-service-infra.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.services_json) }}

    env:
      RELEASE_TIER: ${{ needs.resolve-release.outputs.release_tier }}
      STRICT_SECURITY: ${{ needs.resolve-release.outputs.strict_security }}
      AZURE_ENV_NAME: ${{ needs.resolve-release.outputs.azure_env_name }}
      ACA_ENVIRONMENT_NAME: ${{ needs.resolve-release.outputs.aca_environment_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Resolve guardrail context
        env:
          SERVICE: ${{ matrix.service }}
        run: |
          set -euo pipefail
          echo "RG=tutor-${AZURE_ENV_NAME}" >> "$GITHUB_ENV"
          echo "APIM_NAME=tutor-${AZURE_ENV_NAME}-apim" >> "$GITHUB_ENV"
          echo "APP_NAME=tutor-${SERVICE}-${AZURE_ENV_NAME}" >> "$GITHUB_ENV"
          echo "API_ID=${SERVICE}-api" >> "$GITHUB_ENV"
          echo "EXPECTED_PATH=api/${SERVICE}" >> "$GITHUB_ENV"
          echo "STACK_DIR=infra/terraform/stacks/services/${SERVICE}" >> "$GITHUB_ENV"

      - name: Resolve required APIM CORS origins (SWA default + custom domains)
        run: |
          set -euo pipefail

          swa_name="tutor-${AZURE_ENV_NAME}-frontend"
          swa_default_host="$(az staticwebapp show --name "$swa_name" --resource-group "$RG" --query 'defaultHostname' -o tsv 2>/dev/null || true)"
          if [ -z "$swa_default_host" ]; then
            echo "Failed to resolve SWA default hostname for '$swa_name' in '$RG'."
            exit 1
          fi

          mapfile -t swa_custom_hosts < <(
            az staticwebapp hostname list \
              --name "$swa_name" \
              --resource-group "$RG" \
              --query "[?name!='${swa_default_host}'].name" \
              -o tsv 2>/dev/null || true
          )

          required_origins=("https://${swa_default_host}")
          for custom_host in "${swa_custom_hosts[@]}"; do
            [ -n "$custom_host" ] || continue
            required_origins+=("https://${custom_host}")
          done

          required_origins_json="$(printf '%s\n' "${required_origins[@]}" | awk 'NF' | python -c 'import json,sys; print(json.dumps([line.strip() for line in sys.stdin if line.strip()]))')"

          echo "SWA_DEFAULT_ORIGIN=https://${swa_default_host}" >> "$GITHUB_ENV"
          echo "REQUIRED_CORS_ORIGINS_JSON=${required_origins_json}" >> "$GITHUB_ENV"
          echo "Resolved required APIM CORS origins: ${required_origins_json}"

      - name: Enforce network baseline (VNet + Private Endpoint)
        run: |
          set -euo pipefail

          echo "=== Network baseline check :: ${RG} ==="
          aca_subnet_id="$(az containerapp env show -g "$RG" -n "$ACA_ENVIRONMENT_NAME" --query 'properties.vnetConfiguration.infrastructureSubnetId' -o tsv 2>/dev/null || true)"
          if [ -z "$aca_subnet_id" ]; then
            echo "ACA environment '${ACA_ENVIRONMENT_NAME}' is not integrated with a VNet subnet."
            exit 1
          fi

          cosmos_public_access="$(az cosmosdb list -g "$RG" --query '[0].publicNetworkAccess' -o tsv 2>/dev/null || true)"
          if [ -n "$cosmos_public_access" ] && [ "$cosmos_public_access" != "Disabled" ]; then
            echo "Cosmos DB public network access must be Disabled, found: ${cosmos_public_access}."
            exit 1
          fi

          cosmos_private_endpoint_count="$(az network private-endpoint list -g "$RG" --query "[?contains(privateLinkServiceConnections[0].privateLinkServiceId, 'Microsoft.DocumentDB/databaseAccounts')]| length(@)" -o tsv 2>/dev/null || echo 0)"
          if [ "${cosmos_private_endpoint_count:-0}" = "0" ]; then
            echo "No Cosmos DB private endpoint found in resource group ${RG}."
            exit 1
          fi

      - name: Validate ACA revision readiness
        run: |
          set -euo pipefail

          echo "=== ACA readiness check :: ${APP_NAME} ==="
          latest_revision="$(az containerapp show -g "$RG" -n "$APP_NAME" --query 'properties.latestRevisionName' -o tsv)"
          latest_ready_revision="$(az containerapp show -g "$RG" -n "$APP_NAME" --query 'properties.latestReadyRevisionName' -o tsv)"
          running_state="$(az containerapp revision show -g "$RG" -n "$APP_NAME" --revision "$latest_revision" --query 'properties.runningState' -o tsv)"
          replicas="$(az containerapp revision show -g "$RG" -n "$APP_NAME" --revision "$latest_revision" --query 'properties.replicas' -o tsv)"

          is_healthy="true"
          if [ "$latest_revision" != "$latest_ready_revision" ] || { [ "$running_state" != "Running" ] && [ "$running_state" != "ScaledToZero" ]; }; then
            is_healthy="false"
          fi

          if [ "$is_healthy" = "false" ]; then
            echo "Latest revision is not healthy (latest=$latest_revision, ready=$latest_ready_revision, state=$running_state, replicas=${replicas:-0})."

            if [ "$STRICT_SECURITY" = "true" ]; then
              echo "Strict mode enabled for ${RELEASE_TIER}; fallback is not allowed."
              az containerapp revision list \
                -g "$RG" \
                -n "$APP_NAME" \
                --query '[].{name:name,active:properties.active,runningState:properties.runningState,replicas:properties.replicas,createdTime:properties.createdTime,image:properties.template.containers[0].image}' \
                -o table || true
              exit 1
            fi

            if [ -n "$latest_ready_revision" ] && [ "$latest_ready_revision" != "$latest_revision" ]; then
              echo "Relaxed mode for ${RELEASE_TIER}: applying traffic fallback to '$latest_ready_revision'."
              az containerapp ingress traffic set -g "$RG" -n "$APP_NAME" --revision-weight "${latest_ready_revision}=100" --output none
              az containerapp revision deactivate -g "$RG" -n "$APP_NAME" --revision "$latest_revision" --output none || true
            else
              echo "No healthy fallback revision available."
              exit 1
            fi
          fi

      - name: Validate APIM route integrity
        run: |
          set -euo pipefail

          echo "=== APIM route integrity check :: ${API_ID} ==="
          api_path="$(az apim api show -g "$RG" --service-name "$APIM_NAME" --api-id "$API_ID" --query 'path' -o tsv)"
          subscription_required="$(az apim api show -g "$RG" --service-name "$APIM_NAME" --api-id "$API_ID" --query 'subscriptionRequired' -o tsv)"
          protocols="$(az apim api show -g "$RG" --service-name "$APIM_NAME" --api-id "$API_ID" --query 'protocols' -o tsv)"
          actual_service_url="$(az apim api show -g "$RG" --service-name "$APIM_NAME" --api-id "$API_ID" --query 'serviceUrl' -o tsv)"

          app_fqdn="$(az containerapp show -g "$RG" -n "$APP_NAME" --query 'properties.configuration.ingress.fqdn' -o tsv)"
          expected_service_url="https://${app_fqdn}"

          [ "$api_path" = "$EXPECTED_PATH" ] || { echo "APIM path drift: expected=$EXPECTED_PATH actual=$api_path"; exit 1; }
          [ "$subscription_required" = "false" ] || { echo "APIM subscriptionRequired drift: $subscription_required"; exit 1; }
          [ "$protocols" = "https" ] || { echo "APIM protocol drift: expected https, got=$protocols"; exit 1; }
          [ "$actual_service_url" = "$expected_service_url" ] || { echo "APIM serviceUrl drift: expected=$expected_service_url actual=$actual_service_url"; exit 1; }

      - name: Validate APIM policy and remediate drift (non-prod)
        env:
          SERVICE: ${{ matrix.service }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TFSTATE_RESOURCE_GROUP: ${{ secrets.TERRAFORM_STATE_RESOURCE_GROUP }}
          TFSTATE_STORAGE_ACCOUNT: ${{ secrets.TERRAFORM_STATE_STORAGE_ACCOUNT }}
          TFSTATE_CONTAINER: ${{ secrets.TERRAFORM_STATE_CONTAINER }}
        run: |
          set -euo pipefail

          echo "=== APIM policy drift check :: ${API_ID} ==="
          policy_url="https://management.azure.com/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.ApiManagement/service/${APIM_NAME}/apis/${API_ID}/policies/policy?api-version=2022-08-01"
          live_policy="$(az rest --method get --url "$policy_url" --query 'properties.value' -o tsv 2>/dev/null || echo '')"

          mapfile -t required_origins < <(python -c "import json, os; [print(origin) for origin in json.loads(os.environ.get('REQUIRED_CORS_ORIGINS_JSON', '[]')) if origin]")

          if [ "${#required_origins[@]}" -eq 0 ]; then
            echo "No required CORS origins resolved; aborting guardrail check."
            exit 1
          fi

          check_required_origins() {
            local policy_content="$1"
            missing_origins=()
            for origin in "${required_origins[@]}"; do
              if ! grep -Fq "<origin>${origin}</origin>" <<<"$policy_content"; then
                missing_origins+=("$origin")
              fi
            done

            if [ "${#missing_origins[@]}" -gt 0 ]; then
              return 1
            fi

            return 0
          }

          has_cors="false"
          if [ -n "$live_policy" ] && grep -q '<cors' <<<"$live_policy"; then
            has_cors="true"
          fi

          origins_complete="true"
          if ! check_required_origins "$live_policy"; then
            origins_complete="false"
          fi

          if [ "$has_cors" != "true" ] || [ "$origins_complete" != "true" ]; then
            echo "APIM CORS drift detected for ${API_ID}."
            if [ "$has_cors" != "true" ]; then
              echo "- Missing <cors> block in live APIM policy."
            fi

            echo "- Missing required origins:"
            for origin in "${missing_origins[@]}"; do
              echo "  - ${origin}"
            done

            if [ "$STRICT_SECURITY" = "true" ]; then
              echo "APIM policy drift detected for ${API_ID}. Strict mode enabled; remediation disabled."
              exit 1
            fi

            echo "APIM policy drift detected for ${API_ID}. Applying one-shot Terraform remediation in ${RELEASE_TIER}."

            export TF_VAR_allowed_origins="$REQUIRED_CORS_ORIGINS_JSON"
            terraform -chdir="$STACK_DIR" init -backend=false -input=false
            terraform -chdir="$STACK_DIR" apply -auto-approve

            live_policy="$(az rest --method get --url "$policy_url" --query 'properties.value' -o tsv)"
            if [ -z "$live_policy" ] || ! grep -q '<cors' <<<"$live_policy"; then
              echo "APIM policy remediation failed for ${API_ID}."
              exit 1
            fi

            if ! check_required_origins "$live_policy"; then
              echo "APIM policy remediation failed for ${API_ID}; required origins are still missing:"
              for origin in "${missing_origins[@]}"; do
                echo "  - ${origin}"
              done
              exit 1
            fi
          fi

      - name: Validate configuration API CORS preflight
        if: matrix.service == 'configuration'
        run: |
          set -euo pipefail

          preflight_url="https://${APIM_NAME}.azure-api.net/api/configuration/themes"
          response_headers_file="$(mktemp)"

          status_code="$(curl -sS -o /dev/null -D "$response_headers_file" -X OPTIONS \
            -H "Origin: ${SWA_DEFAULT_ORIGIN}" \
            -H "Access-Control-Request-Method: GET" \
            -H "Access-Control-Request-Headers: content-type" \
            --max-time 20 \
            -w "%{http_code}" \
            "$preflight_url" || echo 000)"

          allow_origin="$(grep -i '^access-control-allow-origin:' "$response_headers_file" | tail -n 1 | cut -d':' -f2- | xargs || true)"

          if [ "$status_code" = "000" ] || [ "$status_code" -ge 500 ]; then
            echo "CORS preflight failed for ${preflight_url}: HTTP ${status_code}."
            exit 1
          fi

          if [ "$allow_origin" != "${SWA_DEFAULT_ORIGIN}" ] && [ "$allow_origin" != "*" ]; then
            echo "CORS preflight missing allow-origin for ${SWA_DEFAULT_ORIGIN}. Returned: '${allow_origin}'."
            exit 1
          fi

          echo "CORS preflight passed for ${preflight_url} from origin ${SWA_DEFAULT_ORIGIN}."

      - name: APIM smoke check
        run: |
          set -euo pipefail

          echo "=== APIM smoke check :: ${API_ID} ==="
          status_code="$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "https://${APIM_NAME}.azure-api.net/${EXPECTED_PATH}/health" || echo 000)"
          if [ "$status_code" = "000" ] || [ "$status_code" -ge 500 ]; then
            echo "APIM smoke check failed for ${API_ID}: HTTP ${status_code}."
            exit 1
          fi

          echo "Guardrails passed for ${API_ID}."
