repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: biome-check
        name: biome-check
        entry: pnpm --dir frontend lint
        language: system
        pass_filenames: false
        types: [text]
