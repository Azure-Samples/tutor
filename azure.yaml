      ENTRA_TOKEN_AUDIENCE: ${ENTRA_TOKEN_AUDIENCE}
      ENTRA_ALLOWED_CLIENT_APP_IDS: ${ENTRA_ALLOWED_CLIENT_APP_IDS}
  frontend:
    project: frontend
    dist: .next
    language: js
    host: staticwebapp
    env:
      NEXT_PUBLIC_APIM_BASE_URL: ${NEXT_PUBLIC_APIM_BASE_URL}
